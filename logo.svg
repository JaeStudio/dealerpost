<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 52" width="48" height="52" overflow="visible">
  <defs>
    <!-- Gold gradient: top bright to bottom rich -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fce88a"/>
      <stop offset="35%"  stop-color="#f0c84a"/>
      <stop offset="70%"  stop-color="#c8922a"/>
      <stop offset="100%" stop-color="#9a6b15"/>
    </linearGradient>
    <!-- Shine overlay: diagonal white highlight -->
    <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="45%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Animated shine sweep: moves left-to-right -->
    <linearGradient id="shineAnim" x1="-100%" y1="0" x2="0%" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-48 0" to="96 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- Dark fill for chip body interior -->
    <linearGradient id="chipBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#0a0804"/>
    </linearGradient>
    <!-- Gold glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── CHIP PINS (left & right sides) ── -->
  <!-- Left pins -->
  <rect x="3"  y="13" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <rect x="3"  y="19" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <rect x="3"  y="25" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <rect x="3"  y="31" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <!-- Right pins -->
  <rect x="38" y="13" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <rect x="38" y="19" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <rect x="38" y="25" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>
  <rect x="38" y="31" width="7" height="2.5" rx="1.2" fill="url(#goldGrad)"/>

  <!-- ── CHIP BODY (outer border) ── -->
  <rect x="10" y="7" width="28" height="34" rx="4" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- ── CHIP BODY INTERIOR ── -->
  <rect x="12" y="9" width="24" height="30" rx="2.5" fill="url(#chipBody)"/>

  <!-- ── CIRCUIT LINES (decorative inner traces) ── -->
  <!-- Horizontal center trace -->
  <line x1="16" y1="24" x2="32" y2="24" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.7"/>
  <!-- Vertical left trace -->
  <line x1="20" y1="13" x2="20" y2="35" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Vertical right trace -->
  <line x1="28" y1="13" x2="28" y2="35" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- ── CENTER CORE (the "DP" AI node) ── -->
  <rect x="17" y="19" width="14" height="10" rx="2" fill="url(#goldGrad)" opacity="0.92"/>
  <!-- Core shine -->
  <rect x="17" y="19" width="14" height="10" rx="2" fill="url(#shineGrad)"/>
  <!-- Corner dots -->
  <circle cx="19.5" cy="21.5" r="1"   fill="#0a0804" opacity="0.6"/>
  <circle cx="28.5" cy="21.5" r="1"   fill="#0a0804" opacity="0.6"/>
  <circle cx="19.5" cy="26.5" r="1"   fill="#0a0804" opacity="0.6"/>
  <circle cx="28.5" cy="26.5" r="1"   fill="#0a0804" opacity="0.6"/>
  <!-- Center dot (AI core) -->
  <circle cx="24"   cy="24"   r="1.5" fill="#0a0804" opacity="0.8"/>

  <!-- ── OUTER CHIP SHINE OVERLAY ── -->
  <rect x="10" y="7" width="28" height="34" rx="4" fill="url(#shineGrad)"/>

  <!-- ── ANIMATED SHINE SWEEP ── -->
  <rect x="10" y="7" width="28" height="34" rx="4" fill="url(#shineAnim)"/>
</svg>
