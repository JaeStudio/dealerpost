name: Weekly Newsletter

on:
  schedule:
    # Every Monday at 9:00 AM ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send Weekly Newsletter
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://nzsabhwodjlkumzlmmxf.supabase.co/functions/v1/send-newsletter" \
            -H "Authorization: Bearer ${{ secrets.NEWSLETTER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Newsletter send failed with HTTP $HTTP_CODE"
            echo "Body: $BODY"
            exit 1
          fi

          SENT=$(echo "$BODY" | grep -o '"sent":[0-9]*' | grep -o '[0-9]*')
          echo "Success! Sent to $SENT subscribers."
